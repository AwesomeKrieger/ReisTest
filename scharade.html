<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Landscape Haptics Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white overflow-hidden">

    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "web-haptics/react": "https://esm.sh/web-haptics@1.0.4/react"
        }
    }
    </script>

    <script type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom';
        import { useWebHaptics } from 'web-haptics/react';

        function App() {
            const { trigger } = useWebHaptics();
            const [active, setActive] = useState(false);
            const [tilt, setTilt] = useState(0);
            const [lastAction, setLastAction] = useState(null);

            useEffect(() => {
                if (!active) return;

                const handleOrientation = (e) => {
                    // Im Querformat (Handy seitlich) nutzen wir GAMMA für vorne/hinten
                    // Je nachdem wie du es drehst (links/rechts rum), musst du evtl. e.gamma prüfen
                    const angle = Math.round(e.gamma); 
                    setTilt(angle);

                    // TRIGGER VORNE (Kippen weg von dir)
                    if (angle < -35 && lastAction !== 'forward') {
                        trigger([
                            { duration: 30 },
                            { delay: 60, duration: 40, intensity: 1 },
                        ]);
                        setLastAction('forward');
                    } 
                    // TRIGGER HINTEN (Kippen zu dir hin)
                    else if (angle > 35 && lastAction !== 'backward') {
                        trigger([
                            { duration: 40 },
                            { delay: 40, duration: 40 },
                            { delay: 40, duration: 40 },
                        ], { intensity: 0.9 });
                        setLastAction('backward');
                    } 
                    // RESET (Neutraler Bereich)
                    else if (angle > -15 && angle < 15) {
                        setLastAction(null);
                    }
                };

                window.addEventListener('deviceorientation', handleOrientation);
                return () => window.removeEventListener('deviceorientation', handleOrientation);
            }, [active, lastAction, trigger]);

            return (
                <div class="h-screen w-screen flex flex-col items-center justify-center p-6">
                    {!active ? (
                        <button 
                            onClick={() => setActive(true)}
                            class="bg-white text-black font-black px-12 py-6 rounded-full text-xl active:scale-90 transition-transform"
                        >
                            START LANDSCAPE MODE
                        </button>
                    ) : (
                        <div class="text-center">
                            <div class={`text-8xl font-black mb-4 transition-colors ${lastAction ? 'text-yellow-400' : 'text-white'}`}>
                                {tilt}°
                            </div>
                            <div class="text-sm tracking-[0.3em] opacity-50 uppercase">
                                {lastAction || 'Handy im Querformat kippen'}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
