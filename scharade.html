<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="HeadBanz"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>HeadBanz 🎭</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  background:#fff;transition:background .25s;}
body.dark{background:#0d0f1a;}

/* ─── THEME ─── */
:root{
  --bg:#fff;--bg2:#f5f5f5;--card:#fff;
  --sep:#e8e8e8;--txt:#111;--txt2:#555;--txt3:#999;
  --hdr:rgba(255,255,255,.95);--page:#f5f5f5;
  --row:#f0f0f0;--acc:#2563eb;--inp:#111;
}
body.dark{
  --bg:#0d0f1a;--bg2:#141620;--card:#1e2030;
  --sep:rgba(255,255,255,.09);--txt:#f0f0f0;--txt2:#9090a8;--txt3:#505060;
  --hdr:rgba(14,16,26,.96);--page:#13151f;
  --row:#252738;--acc:#60a5fa;--inp:#f0f0f0;
}

/* ─── SINGLE SCREEN CONTAINER ─── */
/* Only ONE .screen is visible at a time */
#root{position:relative;}
.screen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  overflow:hidden;
  transition:transform .36s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.screen.show{transform:translateX(0);}
.screen.hide-left{transform:translateX(-100%);}
.screen.hide-right{transform:translateX(100%);}

/* ─── SCROLLABLE ─── */
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:0;}
.scroll::-webkit-scrollbar{display:none;}

/* ─── iOS HEADER ─── */
.ios-hdr{
  height:52px;display:flex;align-items:center;padding:0 6px;flex-shrink:0;
  background:var(--hdr);border-bottom:1px solid var(--sep);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:10;
}
.ios-hdr-title{flex:1;text-align:center;font-size:17px;font-weight:800;
  color:var(--txt);letter-spacing:-.01em;}
.back-btn{display:flex;align-items:center;gap:3px;background:none;border:none;
  color:var(--acc);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;
  padding:8px 10px;min-width:80px;cursor:pointer;outline:none;}
.right-btn{background:none;border:none;color:var(--acc);
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;
  padding:8px 10px;min-width:80px;text-align:right;cursor:pointer;outline:none;}

/* ─── LIST ─── */
.sec{margin:22px 16px 0;}
.sec-label{font-size:12px;font-weight:700;color:var(--txt3);
  letter-spacing:.04em;text-transform:uppercase;padding:0 5px;margin-bottom:6px;}
.group{background:var(--card);border-radius:14px;overflow:hidden;}
.row{display:flex;align-items:center;min-height:52px;padding:0 16px;gap:10px;
  border-bottom:1px solid var(--sep);cursor:pointer;transition:background .1s;}
.row:last-child{border-bottom:none;}
.row:active{background:var(--row);}
.row.static{cursor:default;}.row.static:active{background:transparent;}
.row-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:17px;flex-shrink:0;}
.row-body{flex:1;min-width:0;padding:12px 0;display:flex;flex-direction:column;}
.row-label{font-size:15px;font-weight:700;color:var(--txt);line-height:1.3;}
.row-sub{font-size:12px;font-weight:600;color:var(--txt3);margin-top:1px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.row-value{font-size:14px;font-weight:600;color:var(--txt3);white-space:nowrap;flex-shrink:0;}
.row-arrow{color:var(--txt3);font-size:20px;opacity:.4;flex-shrink:0;line-height:1;}
.row-check{color:var(--acc);font-size:18px;font-weight:900;width:26px;flex-shrink:0;}

/* ─── INPUT ─── */
.inp{background:transparent;border:none;outline:none;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;
  color:var(--inp);flex:1;min-width:0;width:100%;}

/* ─── TOGGLE ─── */
.tog{width:51px;height:31px;border-radius:16px;border:none;outline:none;
  position:relative;flex-shrink:0;transition:background .2s;cursor:pointer;}
.tog-knob{position:absolute;top:3px;left:3px;width:25px;height:25px;
  border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.28);
  transition:transform .22s cubic-bezier(.34,1.4,.64,1);}
.tog-knob.on{transform:translateX(20px);}

/* ─── BUTTONS ─── */
.btn{cursor:pointer;border:none;outline:none;font-family:'Nunito',sans-serif;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .13s cubic-bezier(.34,1.4,.64,1);}
.btn:active{transform:scale(.93);}
.btn-primary{background:var(--acc);color:#fff;font-weight:900;border-radius:14px;
  box-shadow:0 4px 16px rgba(37,99,235,.35);}
.btn-sm{background:var(--acc);color:#fff;border-radius:9px;
  font-weight:800;font-size:14px;padding:7px 13px;}

/* ─── MENU / HOME ─── */
.blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.38;
  animation:bdrift 15s ease-in-out infinite;}
@keyframes bdrift{0%,100%{transform:translate(0,0);}
  40%{transform:translate(4vw,-5vh);}70%{transform:translate(-3vw,4vh);}}
.card{border-radius:22px;cursor:pointer;overflow:hidden;position:relative;
  transition:transform .17s cubic-bezier(.34,1.4,.64,1);}
.card:active{transform:scale(.92);}

/* ─── GAME ─── */
.gbg{position:absolute;inset:0;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 12s ease-in-out infinite;}
@keyframes drift{0%,100%{transform:translate(0,0);}
  33%{transform:translate(2vw,-2vh);}66%{transform:translate(-2vw,2vh);}}
.glass-dk{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28);
  box-shadow:0 12px 48px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.35);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);}
.glass-lt{background:rgba(255,255,255,.88);border:1px solid rgba(0,0,0,.09);
  box-shadow:0 12px 48px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.9);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);}
.word-card{transition:all .35s cubic-bezier(.34,1.1,.64,1);}
.word-card.solved{background:rgba(22,163,74,.28)!important;
  border-color:rgba(22,163,74,.6)!important;
  box-shadow:0 0 80px rgba(22,163,74,.5)!important;}
.word-card.skipped{background:rgba(217,119,6,.24)!important;
  border-color:rgba(217,119,6,.55)!important;
  box-shadow:0 0 80px rgba(217,119,6,.4)!important;}
.bigword{font-size:clamp(2rem,7vw,4.5rem);font-weight:900;
  letter-spacing:-.03em;line-height:1.05;}
.tring{transform:rotate(-90deg);}
.tring circle{transition:stroke-dashoffset 1s linear;}
.pulse{animation:pp 2s ease-in-out infinite;}
@keyframes pp{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.4);}
  50%{box-shadow:0 0 0 14px rgba(37,99,235,0);}}

/* ─── PAUSE ─── */
.pause-overlay{position:absolute;inset:0;z-index:50;background:rgba(8,9,15,.93);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;text-align:center;padding:2rem;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}

/* ─── DEBUG ─── */
.dbg{position:absolute;bottom:0;left:0;right:0;z-index:99;
  background:rgba(4,4,8,.97);font-family:'Courier New',monospace;
  padding:8px 10px 10px;
  padding-bottom:max(10px,calc(env(safe-area-inset-bottom)+6px));
  display:flex;flex-direction:column;gap:5px;}
.dbg-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dbg-track{flex:1;min-width:120px;height:14px;background:rgba(255,255,255,.07);
  border-radius:7px;position:relative;overflow:hidden;}
.dbg-fill{position:absolute;top:0;bottom:0;left:0;border-radius:7px;transition:width .08s;}
.dbg-needle{position:absolute;top:0;bottom:0;width:2px;border-radius:1px;transition:left .08s;}
.dbg-mark{position:absolute;top:2px;bottom:2px;width:1.5px;border-radius:1px;}
.dbg-close{background:#ef4444;color:#fff;border:none;border-radius:6px;
  font-size:10px;font-weight:800;padding:2px 7px;cursor:pointer;flex-shrink:0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useMemo}=React;

/* ═══════════════════════════════════════
   TILT CONFIG  ←  edit these values
   
   Phone held flat in LANDSCAPE over head.
   gamma axis: 0° = flat, negative = left side tips down,
                             positive = right side tips down
   Range in use: -90° to +90°

   SOLVE zone:  0° to -45°  (slight left tilt)  → ✓ Gelöst
   SKIP  zone:  0° to +45°  (slight right tilt)  → ↩ Skip
   Dead zones:  -45° to -90°  and  +45° to +90°  (too far, no action)
   Neutral:     exactly around 0° (flat)

   Change TILT_SOLVE_MAX and TILT_SKIP_MAX to tune.
═══════════════════════════════════════ */
const TILT_SOLVE_MAX = -45;  // gamma below this = solve  (e.g. -30 = easier)
const TILT_SKIP_MAX  =  45;  // gamma above this = skip   (e.g.  30 = easier)
const TILT_DEBOUNCE  = 850;  // ms between triggers

/* ─── WORD DATA ─── */
const CATS={
  "Tiere":["Elefant","Delfin","Pinguin","Krokodil","Flamingo","Nashorn","Gepard","Koala","Otter","Faultier","Axolotl","Schnabeltier","Quokka","Tapir","Leguan","Erdmännchen","Tukan","Wombat","Gorilla","Kamel"],
  "Filme":["Titanic","Matrix","Avatar","Inception","Interstellar","Gladiator","Der Pate","Joker","Parasite","Avengers","Forrest Gump","Pulp Fiction","Fight Club","The Dark Knight","Jurassic Park","Star Wars","Memento","Amelie","Braveheart","Der Schuh des Manitu"],
  "Berufe":["Feuerwehrmann","Astronaut","Dirigent","Uhrmacher","Sommelier","Bestatter","Hebamme","Förster","Logopäde","Imker","Notar","Taucher","Vulkanologe","Schornsteinfeger","Goldschmied","Glasmacher","Buchdrucker","Falknerin","Floristin","Seiler"],
  "Essen":["Sushi","Guacamole","Fondue","Tiramisu","Baklava","Hummus","Ceviche","Paella","Kimchi","Pho","Ratatouille","Shakshuka","Wiener Schnitzel","Bibimbap","Falafel","Rendang","Crêpe","Borschtsch","Khinkali","Käsespätzle"],
  "Sport":["Curling","Bogenschießen","Sumo","Synchronschwimmen","Klettern","Fechten","Bobfahren","Polo","Snooker","Trampolinturnen","Skeleton","Wasserball","Biathlon","Beachvolleyball","Taekwondo","Kanupolo","Sepaktakraw","Hornussen","Floorball","Breakdance"],
  "Orte":["Machu Picchu","Stonehenge","Angkor Wat","Petra","Alhambra","Pompeji","Taj Mahal","Kolosseum","Akropolis","Timbuktu","Persepolis","Versailles","Neuschwanstein","Galapagos","Kappadokien","Fjorde","Okavango","Rapa Nui","Ephesos","Chichen Itza"],
  "Geschichte":["Napoleon","Kleopatra","Einstein","Shakespeare","Mozart","Galileo","Marie Curie","Kolumbus","Tesla","Newton","Darwin","Gandhi","Julius Cäsar","Marco Polo","Archimedes","Kopernikus","Sokrates","Konfuzius","Aristoteles","Che Guevara"],
  "Technologie":["Smartphone","3D-Drucker","Drohne","Roboter","Elektroauto","Satellit","Laser","Solarpanel","KI","VR-Brille","Hologramm","Mikrochip","Magnetschwebebahn","Kernfusion","Exoskelett","Quantencomputer","Supraleiter","Bioreaktor","Nanobot","Bluetooth"]
};
const TEAM_COLORS=['#2563eb','#7c3aed','#ea580c','#16a34a','#dc2626','#0891b2'];
const vib=p=>navigator.vibrate&&navigator.vibrate(p);
const hapT=()=>vib([8]);
const hapS=()=>vib([35]);
const hapK=()=>vib([15,55,15]);
const hapE=()=>vib([50,30,50]);
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

/* ─── BACK ARROW ─── */
const BackArrow=()=>(
  <svg width="9" height="16" viewBox="0 0 9 16" fill="none">
    <path d="M7.5 1L1 8L7.5 15" stroke="var(--acc)" strokeWidth="2.2"
      strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

/* ─── TOGGLE ─── */
function Toggle({on,onChange}){
  return(
    <button className="tog" style={{background:on?'#34c759':'#d1d1d6'}}
      onClick={()=>{hapT();onChange(!on);}}>
      <div className={"tog-knob"+(on?' on':'')}/>
    </button>
  );
}

/* ─── TIMER RING ─── */
function Ring({sec,max,size=60}){
  const r=(size-8)/2,ci=2*Math.PI*r;
  const off=ci*(1-(max>0?sec/max:1));
  const col=sec<=10?'#ef4444':sec<=30?'#f59e0b':'#22c55e';
  return(
    <svg width={size} height={size} className="tring">
      <circle cx={size/2} cy={size/2} r={r} fill="none"
        stroke="rgba(255,255,255,.15)" strokeWidth="6"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none"
        stroke={col} strokeWidth="6" strokeDasharray={ci}
        strokeDashoffset={off} strokeLinecap="round"/>
      <text x={size/2} y={size/2+1} textAnchor="middle"
        dominantBaseline="middle"
        style={{fill:col,fontSize:14,fontWeight:900,fontFamily:'Nunito'}}
        transform={`rotate(90,${size/2},${size/2})`}>{sec}</text>
    </svg>
  );
}

/* ─── SENSOR DEBUG BAR ─── */
function DebugBar({sensors,onClose}){
  const{alpha,beta,gamma}=sensors;
  const g=gamma??0;
  // trigger zones
  const isSolve=gamma!=null&&gamma>TILT_SOLVE_MAX&&gamma<0;
  const isSkip=gamma!=null&&gamma<TILT_SKIP_MAX&&gamma>0;
  const isDeadL=gamma!=null&&gamma<=TILT_SOLVE_MAX;
  const isDeadR=gamma!=null&&gamma>=TILT_SKIP_MAX;
  const state=isDeadL?'DEAD-':isSolve?'GELÖST ✓':isSkip?'SKIP ↩':isDeadR?'DEAD+':'NEUTRAL';
  const stateColor=isDeadL||isDeadR?'#555':isSolve?'#4ade80':isSkip?'#fbbf24':'#aaa';

  // Convert value to 0-100% for display
  function pct(val,min,max){return Math.min(100,Math.max(0,(val-min)/(max-min)*100));}

  function Track({val,min,max,zones,label}){
    if(val==null)return(
      <div className="dbg-row">
        <span style={{color:'#555',fontSize:10,minWidth:90}}>{label} –</span>
      </div>
    );
    const p=pct(val,min,max);
    return(
      <div className="dbg-row">
        <span style={{color:'#666',fontSize:10,minWidth:90,flexShrink:0}}>
          {label} <span style={{color:'#0f0'}}>{val.toFixed(1)}°</span>
        </span>
        <div className="dbg-track">
          {/* zone overlays */}
          {zones&&zones.map((z,i)=>(
            <div key={i} style={{position:'absolute',
              left:pct(z.from,min,max)+'%',
              width:(pct(z.to,min,max)-pct(z.from,min,max))+'%',
              top:0,bottom:0,background:z.color,opacity:.18}}/>
          ))}
          {/* threshold marks */}
          {zones&&zones.map((z,i)=>(
            <React.Fragment key={'m'+i}>
              <div className="dbg-mark" style={{left:pct(z.from,min,max)+'%',background:z.color}}/>
              <div className="dbg-mark" style={{left:pct(z.to,min,max)+'%',background:z.color}}/>
            </React.Fragment>
          ))}
          {/* needle */}
          <div className="dbg-needle" style={{left:p+'%',background:'#fff'}}/>
        </div>
      </div>
    );
  }

  const gammaZones=[
    {from:TILT_SOLVE_MAX,to:0,color:'#4ade80'},   // solve zone
    {from:0,to:TILT_SKIP_MAX,color:'#fbbf24'},    // skip zone
  ];

  return(
    <div className="dbg">
      <div className="dbg-row">
        <button className="dbg-close" onClick={onClose}>✕</button>
        <span style={{color:stateColor,fontSize:12,fontWeight:900}}>{state}</span>
        <span style={{color:'#444',fontSize:10}}>
          solve {TILT_SOLVE_MAX}°…0° · skip 0°…{TILT_SKIP_MAX}°
        </span>
      </div>
      <Track val={alpha} min={0} max={360} label="α alpha"/>
      <Track val={beta}  min={-180} max={180} label="β beta"/>
      <Track val={gamma} min={-90}  max={90}  label="γ gamma" zones={gammaZones}/>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   PERMISSION SCREEN
══════════════════════════════════════════════════ */
function PermScreen({onDone}){
  const[st,setSt]=useState('idle');
  async function req(){
    hapT();
    if(typeof DeviceOrientationEvent!=='undefined'&&
       typeof DeviceOrientationEvent.requestPermission==='function'){
      try{
        const r=await DeviceOrientationEvent.requestPermission();
        if(r==='granted'){setSt('ok');setTimeout(onDone,400);}
        else setSt('denied');
      }catch{setSt('denied');}
    }else{setSt('ok');setTimeout(onDone,300);}
  }
  return(
    <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',
      justifyContent:'center',background:'var(--bg)',padding:'2rem'}}>
      <div style={{background:'var(--card)',border:'1px solid var(--sep)',borderRadius:24,
        maxWidth:340,width:'100%',padding:'2rem',textAlign:'center',
        boxShadow:'0 4px 32px rgba(0,0,0,.07)'}}>
        <div style={{fontSize:'3rem',marginBottom:12}}>
          {st==='ok'?'✅':st==='denied'?'🚫':'📡'}
        </div>
        <div style={{fontSize:20,fontWeight:900,color:'var(--txt)',marginBottom:6}}>
          {st==='ok'?'Bereit!':st==='denied'?'Kein Zugriff':'Sensor-Zugriff'}
        </div>
        <div style={{fontSize:14,color:'var(--txt2)',lineHeight:1.7,marginBottom:24}}>
          {st==='denied'
            ?'Einstellungen → Safari → Bewegung & Ausrichtung aktivieren.'
            :<>Neigungssensor wird benötigt.<br/>
              <strong style={{color:'#16a34a'}}>Links kippen</strong> = ✓ Gelöst<br/>
              <strong style={{color:'#d97706'}}>Rechts kippen</strong> = ↩ Skip</>}
        </div>
        {st!=='denied'&&(
          <button className="btn btn-primary pulse" onClick={req}
            style={{width:'100%',padding:14,fontSize:16,borderRadius:13}}>
            {st==='ok'?'✓ Weiter':'🔓 Aktivieren'}
          </button>
        )}
        {st==='denied'&&(
          <button className="btn" onClick={()=>setSt('idle')}
            style={{width:'100%',padding:12,fontSize:15,fontWeight:700,
              background:'var(--bg2)',borderRadius:12,color:'var(--txt)'}}>
            ← Zurück
          </button>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   SETTINGS — iOS nav stack (portrait)
══════════════════════════════════════════════════ */

/* Inner page navigation — slides within the Settings screen */
function NavStack({pages,current,onNav}){
  /* pages is an object of {id: ReactElement} */
  return(
    <div style={{position:'relative',width:'100%',height:'100%',overflow:'hidden'}}>
      {Object.entries(pages).map(([id,el])=>{
        const isActive=id===current;
        return(
          <div key={id} style={{
            position:'absolute',inset:0,
            transform:isActive?'translateX(0)':'translateX(100%)',
            transition:'transform .32s cubic-bezier(.4,0,.2,1)',
            display:'flex',flexDirection:'column',
            background:'var(--page)',
            overflowY:'auto',WebkitOverflowScrolling:'touch',
          }}>
            {el}
          </div>
        );
      })}
    </div>
  );
}

function Settings({S,upd,onStart}){
  const[view,setView]=useState('home');
  const[editIdx,setEditIdx]=useState(0);
  const[editName,setEditName]=useState('');
  const[newName,setNewName]=useState('');

  const TIME_OPTS=[{l:'1 Min',v:60},{l:'2 Min',v:120},{l:'3 Min',v:180},
    {l:'5 Min',v:300},{l:'10 Min',v:600},{l:'∞',v:0}];
  const totalW=S.selCats.reduce((a,c)=>a+(S.cats[c]?.length||0),0);
  const teamValid=S.teams.every(t=>t.players.length>=2);
  const catValid=S.selCats.length>0;
  const valid=teamValid&&catValid;
  const modeLabel={rounds:'Runden-Duell',highscore:'Highscore-Race','1v1':'1v1 Modus'}[S.mode];

  useEffect(()=>{
    // auto-distribute players to teams
    upd('teams',prev=>{
      const assigned=new Set(prev.flatMap(t=>t.players));
      const unassigned=S.players.filter(p=>!assigned.has(p));
      let next=prev.map(t=>({...t,players:t.players.filter(p=>S.players.includes(p))}));
      unassigned.forEach(p=>{
        const mi=next.reduce((a,t,i)=>t.players.length<next[a].players.length?i:a,0);

/* ══════════════════════════════════════════════════
   GAME SCREEN
══════════════════════════════════════════════════ */
function GameScreen({cfg,onMenu,darkMode}){
  const{teams,mode,rds,tgt,tsec,sel,cats,debug:dbgOn}=cfg;
  const pool=useMemo(()=>{
    const w=[];sel.forEach(c=>{if(cats[c])w.push(...cats[c]);});return shuffle(w);
  },[]);
  const used=useRef(new Set());
  function pull(){
    const av=pool.filter(w=>!used.current.has(w));
    if(!av.length){used.current.clear();}
    const src=av.length?av:pool;
    const w=src[0|Math.random()*src.length]||'???';
    used.current.add(w);return w;
  }

  const[ti,setTi]=useState(0);
  const[rno,setRno]=useState(0);
  const[scores,setScores]=useState(teams.map(()=>0));
  const[phase,setPhase]=useState('ready');
  const[word,setWord]=useState('');
  const[flash,setFlash]=useState(null);
  const[log,setLog]=useState([]);
  const[correction,setCorrection]=useState([]);
  const[timer,setTimer]=useState(tsec>0?tsec:0);
  const[elapsed,setElapsed]=useState(0);
  const[showDbg,setShowDbg]=useState(dbgOn);
  const[sensors,setSensors]=useState({alpha:null,beta:null,gamma:null});
  const[paused,setPaused]=useState(false);

  const timerRef=useRef(null);
  const flashRef=useRef(null);
  const debRef=useRef(false);
  const logRef=useRef([]);
  const phaseRef=useRef('ready');
  const pausedRef=useRef(false);

  useEffect(()=>{phaseRef.current=phase;},[phase]);
  useEffect(()=>{logRef.current=log;},[log]);

  // Portrait → pause
  useEffect(()=>{
    function check(){
      const portrait=window.innerHeight>window.innerWidth;
      if(portrait&&phaseRef.current==='playing'&&!pausedRef.current){
        pausedRef.current=true;setPaused(true);
        clearInterval(timerRef.current);hapE();
      }else if(!portrait&&pausedRef.current){
        pausedRef.current=false;setPaused(false);
        timerRef.current=setInterval(tick,1000);
      }
    }
    window.addEventListener('resize',check);
    window.addEventListener('orientationchange',check);
    return()=>{
      window.removeEventListener('resize',check);
      window.removeEventListener('orientationchange',check);
    };
  },[]);

  function tick(){
    setElapsed(e=>e+1);
    if(tsec>0)setTimer(t=>{
      if(t<=1){clearInterval(timerRef.current);endRound();return 0;}
      return t-1;
    });
  }

  // Tilt detection — gamma axis
  // SOLVE zone: 0° > gamma > TILT_SOLVE_MAX  (slight left/negative tilt)
  // SKIP  zone: 0° < gamma < TILT_SKIP_MAX   (slight right/positive tilt)
  // Dead zones: gamma <= TILT_SOLVE_MAX  or  gamma >= TILT_SKIP_MAX
  useEffect(()=>{
    function handle(e){
      setSensors({alpha:e.alpha,beta:e.beta,gamma:e.gamma});
      if(phaseRef.current!=='playing'||debRef.current||pausedRef.current)return;
      const g=e.gamma;
      if(g==null)return;
      if(g<0&&g>TILT_SOLVE_MAX) doTrigger(doSolve);
      else if(g>0&&g<TILT_SKIP_MAX) doTrigger(doSkip);
    }
    window.addEventListener('deviceorientation',handle,true);
    return()=>window.removeEventListener('deviceorientation',handle,true);
  },[]);

  function doTrigger(fn){
    if(debRef.current)return;
    debRef.current=true;
    fn();
    setTimeout(()=>{debRef.current=false;},TILT_DEBOUNCE);
  }

  function startTimer(){
    clearInterval(timerRef.current);
    if(tsec>0)setTimer(tsec);
    setElapsed(0);
    timerRef.current=setInterval(tick,1000);
  }
  function stopTimer(){clearInterval(timerRef.current);}

  function startRound(){
    const w=pull();setWord(w);setFlash(null);
    setLog([]);logRef.current=[];
    setPhase('playing');startTimer();
  }

  function doSolve(){
    hapS();
    const w=word;
    setFlash('solved');
    setLog(p=>{const n=[...p,{word:w,solved:true}];logRef.current=n;return n;});
    clearTimeout(flashRef.current);
    flashRef.current=setTimeout(()=>{setWord(pull());setFlash(null);},550);
  }

  function doSkip(){
    hapK();
    const w=word;
    setFlash('skipped');
    setLog(p=>{const n=[...p,{word:w,solved:false}];logRef.current=n;return n;});
    clearTimeout(flashRef.current);
    flashRef.current=setTimeout(()=>{setWord(pull());setFlash(null);},550);
  }

  function endRound(){
    stopTimer();
    setCorrection([...logRef.current]);
    setPhase('correction');
  }

  function confirmPoints(){
    const pts=correction.filter(w=>w.solved).length;
    const newScores=scores.map((s,i)=>i===ti?s+pts:s);
    if(mode==='highscore'&&newScores[ti]>=tgt){setScores(newScores);setPhase('over');return;}
    let nti=(ti+1)%teams.length,nrno=rno;
    if(nti===0)nrno++;
    if(mode==='rounds'&&nrno>=rds){setScores(newScores);setPhase('over');return;}
    setScores(newScores);setTi(nti);setRno(nrno);setPhase('ready');
  }

  const team=teams[ti];
  const dk=darkMode;
  const glassClass=dk?'glass-dk':'glass-lt';

  /* BG */
  const BG=()=>(
    <div className="gbg" style={{background:dk?'#08090f':'#ffffff'}}>
      <div className="orb" style={{width:'50vw',height:'50vw',top:'-10%',left:'-5%',
        opacity:.6,background:dk?'#1b3d70':'#dbeafe'}}/>
      <div className="orb" style={{width:'40vw',height:'40vw',top:'20%',right:'-5%',
        opacity:.5,animationDelay:'-4s',background:dk?'#2c1468':'#ede9fe'}}/>
      <div className="orb" style={{width:'35vw',height:'35vw',bottom:'-8%',left:'35%',
        opacity:.5,animationDelay:'-8s',background:dk?'#0c3a28':'#dcfce7'}}/>
    </div>
  );

  /* ── READY ── */
  if(phase==='ready')return(
    <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden'}}>
      <BG/>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',
        justifyContent:'center',padding:'1.5rem',zIndex:1}}>
        <div className={"word-card "+glassClass} style={{borderRadius:28,width:'100%',
          maxWidth:560,display:'flex',flexDirection:'column',alignItems:'center',
          padding:'28px 24px 22px'}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',
            color:dk?'rgba(255,255,255,.4)':'rgba(0,0,0,.35)',marginBottom:12}}>
            {mode==='rounds'?'Runde '+(rno+1)+' / '+rds
             :mode==='highscore'?'Ziel: '+tgt+' Punkte':'1v1 Modus'}
          </div>
          <div style={{fontSize:36,fontWeight:900,color:team.color,
            lineHeight:1,marginBottom:4,textAlign:'center'}}>{team.name}</div>
          <div style={{color:dk?'rgba(255,255,255,.45)':'rgba(0,0,0,.4)',fontSize:14,
            marginBottom:18,textAlign:'center'}}>{team.players.join(' · ')}</div>
          {/* scores */}
          <div style={{display:'flex',gap:8,justifyContent:'center',
            marginBottom:18,flexWrap:'wrap'}}>
            {teams.map((t,i)=>(
              <div key={i} style={{padding:'8px 14px',borderRadius:12,textAlign:'center',minWidth:60,
                background:i===ti?t.color+'28':(dk?'rgba(255,255,255,.07)':'rgba(0,0,0,.04)'),
                border:'1px solid '+(i===ti?t.color+'55':(dk?'rgba(255,255,255,.1)':'rgba(0,0,0,.07)'))}}>
                <div style={{color:t.color,fontWeight:900,fontSize:26,lineHeight:1}}>{scores[i]}</div>
                <div style={{color:dk?'rgba(255,255,255,.4)':'rgba(0,0,0,.4)',
                  fontSize:11,fontWeight:700,marginTop:2}}>{t.name}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:12,color:dk?'rgba(255,255,255,.3)':'rgba(0,0,0,.35)',
            marginBottom:18,lineHeight:1.7,textAlign:'center'}}>
            Querformat · flach über dem Kopf<br/>
            <strong style={{color:dk?'rgba(255,255,255,.6)':'rgba(0,0,0,.6)'}}>Links kippen</strong> = ✓&nbsp;&nbsp;
            <strong style={{color:dk?'rgba(255,255,255,.6)':'rgba(0,0,0,.6)'}}>Rechts kippen</strong> = ↩
          </div>
          <button className="btn btn-primary" onClick={()=>{hapT();startRound();}}
            style={{width:'100%',padding:14,borderRadius:13,fontSize:16}}>
            ▶ Runde starten
          </button>
          <button className="btn" onClick={()=>{hapT();stopTimer();onMenu();}}
            style={{marginTop:10,fontSize:12,color:dk?'rgba(255,255,255,.28)':'rgba(0,0,0,.3)',
              background:'none',padding:'6px 12px',borderRadius:8,fontWeight:700}}>
            ← Menü
          </button>
        </div>
      </div>
      {showDbg&&<DebugBar sensors={sensors} onClose={()=>setShowDbg(false)}/>}
    </div>
  );

  /* ── PLAYING ── */
  if(phase==='playing'){
    const solvedCount=log.filter(w=>w.solved).length;
    const skippedCount=log.filter(w=>!w.solved).length;
    return(
      <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden'}}>
        <BG/>
        <div style={{position:'absolute',inset:0,zIndex:1,display:'flex',
          flexDirection:'column',alignItems:'center',justifyContent:'center',
          gap:10,padding:'10px 16px'}}>
          {/* scorebar */}
          <div style={{position:'absolute',top:8,left:10,right:10,
            display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {teams.map((t,i)=>(
                <div key={i} style={{padding:'4px 9px',borderRadius:8,
                  display:'flex',alignItems:'center',gap:4,
                  background:i===ti?t.color+'28':(dk?'rgba(255,255,255,.06)':'rgba(0,0,0,.04)'),
                  border:'1px solid '+(i===ti?t.color+'50':(dk?'rgba(255,255,255,.1)':'rgba(0,0,0,.08)'))}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:t.color}}/>
                  <span style={{color:t.color,fontWeight:900,fontSize:13}}>{scores[i]}</span>
                  <span style={{color:dk?'rgba(255,255,255,.35)':'rgba(0,0,0,.4)',fontSize:11}}>
                    {t.name}
                  </span>
                </div>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <span style={{color:'#4ade80',fontWeight:900,fontSize:14}}>✓{solvedCount}</span>
              <span style={{color:'#fbbf24',fontWeight:900,fontSize:14}}>↩{skippedCount}</span>
              {tsec>0?<Ring sec={timer} max={tsec} size={58}/>:
                <span style={{color:dk?'rgba(255,255,255,.4)':'rgba(0,0,0,.4)',
                  fontWeight:700,fontSize:12}}>{elapsed}s</span>}
            </div>
          </div>

          {/* word card */}
          <div className={"word-card "+glassClass+' '+(flash||'')} style={{
            borderRadius:28,width:'100%',maxWidth:640,flex:1,maxHeight:'56vh',
            display:'flex',flexDirection:'column',alignItems:'center',
            justifyContent:'center',padding:'18px 28px',textAlign:'center',gap:12,
            marginTop:48}}>
            {flash==='solved'?<div style={{fontSize:'4rem'}}>✓</div>
            :flash==='skipped'?<div style={{fontSize:'4rem'}}>↩</div>
            :<>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:'.08em',
                textTransform:'uppercase',
                color:dk?'rgba(255,255,255,.35)':'rgba(0,0,0,.35)'}}>
                {team.name} erklärt
              </div>
              <div className="bigword"
                style={{color:dk?'#fff':'#111',
                  textShadow:dk?'0 2px 20px rgba(0,0,0,.3)':'none'}}>
                {word}
              </div>
              <div style={{display:'flex',gap:14,fontSize:12,fontWeight:600,
                color:dk?'rgba(255,255,255,.28)':'rgba(0,0,0,.3)'}}>
                <span>{mode==='rounds'?'R.'+(rno+1)+'/'+rds
                  :mode==='highscore'?'Ziel '+tgt:'1v1'}</span>
                {tsec>0&&<span>{timer}s</span>}
              </div>
            </>}
          </div>

          {/* action buttons */}
          <div style={{display:'flex',gap:10,width:'100%',maxWidth:540}}>
            <button className="btn" onClick={doSkip}
              style={{flex:1,padding:12,borderRadius:12,fontWeight:900,fontSize:15,
                background:'rgba(217,119,6,.25)',border:'1px solid rgba(217,119,6,.45)',
                color:'#fbbf24',backdropFilter:'blur(10px)'}}>↩ Skip</button>
            <button className="btn" onClick={doSolve}
              style={{flex:1,padding:12,borderRadius:12,fontWeight:900,fontSize:15,
                background:'rgba(22,163,74,.25)',border:'1px solid rgba(22,163,74,.5)',
                color:'#4ade80',backdropFilter:'blur(10px)'}}>✓ Gelöst</button>
          </div>
          <button className="btn" onClick={endRound}
            style={{fontSize:12,padding:'5px 14px',borderRadius:8,fontWeight:700,
              background:dk?'rgba(255,255,255,.07)':'rgba(0,0,0,.05)',
              border:'1px solid '+(dk?'rgba(255,255,255,.12)':'rgba(0,0,0,.08)'),
              color:dk?'rgba(255,255,255,.3)':'rgba(0,0,0,.4)'}}>
            Runde beenden
          </button>
        </div>
        {paused&&(
          <div className="pause-overlay">
            <div style={{fontSize:'3.5rem',lineHeight:1}}>⏸</div>
            <div style={{fontSize:22,fontWeight:900,color:'#fff'}}>Pausiert</div>
            <div style={{fontSize:14,color:'rgba(255,255,255,.45)',lineHeight:1.7}}>
              Drehe ins <strong style={{color:'rgba(255,255,255,.8)'}}>Querformat</strong><br/>
              um weiterzuspielen 🔄
            </div>
          </div>
        )}
        {showDbg&&<DebugBar sensors={sensors} onClose={()=>setShowDbg(false)}/>}
      </div>
    );
  }

  /* ── CORRECTION ── */
  if(phase==='correction'){
    const pts=correction.filter(w=>w.solved).length;
    return(
      <div style={{width:'100%',height:'100%',background:'var(--bg)',
        display:'flex',flexDirection:'column'}}>
        <div className="ios-hdr">
          <button className="back-btn" onClick={()=>{hapT();stopTimer();onMenu();}}>
            <BackArrow/> Menü
          </button>
          <span className="ios-hdr-title">Korrektur</span>
          <div style={{minWidth:80,textAlign:'right',fontSize:13,
            color:'var(--txt3)',fontWeight:700,paddingRight:10}}>
            {team.name}
          </div>
        </div>
        <div style={{padding:'10px 16px',background:'var(--bg2)',
          borderBottom:'1px solid var(--sep)',
          display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:14,color:'var(--txt2)',fontWeight:700}}>
            Runde {rno+1} · {team.name}
          </span>
          <span style={{fontSize:16,fontWeight:900,color:'#16a34a'}}>{pts} Punkte</span>
        </div>
        <div className="scroll" style={{flex:1}}>
          {correction.length===0&&(
            <div style={{textAlign:'center',padding:'2rem',color:'var(--txt3)',fontSize:14}}>
              Keine Begriffe gespielt.
            </div>
          )}
          {correction.map((item,idx)=>(
            <div key={idx} style={{display:'flex',alignItems:'center',
              justifyContent:'space-between',padding:'12px 16px',
              borderBottom:'1px solid var(--sep)',gap:8}}>
              <span style={{fontWeight:700,fontSize:16,color:'var(--txt)'}}>{item.word}</span>
              <button className="btn" onClick={()=>{
                hapT();
                setCorrection(p=>p.map((w,i)=>i===idx?{...w,solved:!w.solved}:w));
              }} style={{padding:'7px 13px',borderRadius:10,fontSize:13,fontWeight:800,
                whiteSpace:'nowrap',
                background:item.solved?'#f0fdf4':'#fef2f2',
                border:'1.5px solid '+(item.solved?'#bbf7d0':'#fecaca'),
                color:item.solved?'#16a34a':'#dc2626'}}>
                {item.solved?'✓ Gelöst':'✗ Falsch'}
              </button>
            </div>
          ))}
        </div>
        <div style={{padding:'12px 16px',
          paddingBottom:'max(calc(env(safe-area-inset-bottom,0px)+12px),16px)',
          borderTop:'1px solid var(--sep)',background:'var(--card)',
          boxShadow:'0 -4px 16px rgba(0,0,0,.06)'}}>
          <button className="btn btn-primary" onClick={confirmPoints}
            style={{width:'100%',padding:15,fontSize:16,borderRadius:14}}>
            ✓ {pts} Punkte für {team.name}
          </button>
        </div>
      </div>
    );
  }

  /* ── GAME OVER ── */
  if(phase==='over'){
    const mx=Math.max(...scores);
    const wi=scores.indexOf(mx);
    const tie=scores.filter(s=>s===mx).length>1;
    const win=teams[wi];
    return(
      <div style={{width:'100%',height:'100%',background:'var(--bg)',
        display:'flex',alignItems:'center',justifyContent:'center',
        padding:'2rem',overflow:'hidden',position:'relative'}}>
        <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
          <div className="blob" style={{width:'70vw',height:'70vw',
            background:dk?'#1a3360':'#dbeafe',top:'-20%',left:'-15%'}}/>
          <div className="blob" style={{width:'55vw',height:'55vw',
            background:dk?'#2a1860':'#ede9fe',bottom:'-10%',right:'-10%',animationDelay:'-7s'}}/>
        </div>
        <div style={{position:'relative',zIndex:1,background:'var(--card)',
          border:'1px solid var(--sep)',borderRadius:24,maxWidth:420,width:'100%',
          padding:'2rem',textAlign:'center',boxShadow:'0 8px 40px rgba(0,0,0,.1)'}}>
          <div style={{fontSize:'4rem',marginBottom:10}}>{tie?'🤝':'🏆'}</div>
          <div style={{fontSize:30,fontWeight:900,letterSpacing:'-.025em',
            marginBottom:4,color:tie?'var(--txt)':win.color}}>
            {tie?'Unentschieden!':win.name+' gewinnt!'}
          </div>
          {!tie&&<div style={{color:'var(--txt2)',fontWeight:700,fontSize:14,marginBottom:18}}>
            {win.players.join(', ')}
          </div>}
          <div style={{display:'flex',gap:8,justifyContent:'center',
            margin:'16px 0 22px',flexWrap:'wrap'}}>
            {teams.map((t,i)=>(
              <div key={i} style={{padding:'10px 16px',borderRadius:12,textAlign:'center',
                minWidth:72,
                background:i===wi&&!tie?t.color+'18':'var(--bg2)',
                border:'1.5px solid '+(i===wi&&!tie?t.color+'55':'var(--sep)')}}>
                <div style={{color:t.color,fontWeight:900,fontSize:30,lineHeight:1}}>
                  {scores[i]}
                </div>
                <div style={{color:'var(--txt3)',fontSize:11,fontWeight:700,marginTop:2}}>
                  {t.name}
                </div>
              </div>
            ))}
          </div>
          <button className="btn btn-primary" onClick={()=>{hapT();onMenu();}}
            style={{width:'100%',padding:14,fontSize:16,borderRadius:13}}>
            🔄 Neues Spiel
          </button>
        </div>
      </div>
    );
  }
  return null;
}

/* ══════════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════════ */
function App(){
  const[screen,setScreen]=useState('perm'); // perm | menu | game
  const[cfg,setCfg]=useState(null);
  const[S,setS]=useState({
    players:['Spieler 1','Spieler 2','Spieler 3','Spieler 4'],
    teams:[
      {name:'Team 1',players:[],color:TEAM_COLORS[0]},
      {name:'Team 2',players:[],color:TEAM_COLORS[1]},
    ],
    mode:'rounds',rds:3,tgt:20,tsec:60,
    selCats:Object.keys(CATS),cats:CATS,
    debug:false,darkMode:false,
  });

  function upd(k,v){
    setS(prev=>({...prev,[k]:typeof v==='function'?v(prev[k]):v}));
  }

  useEffect(()=>{
    document.body.classList.toggle('dark',S.darkMode);
    const meta=document.querySelector('meta[name="theme-color"]');
    if(meta)meta.setAttribute('content',S.darkMode?'#0d0f1a':'#ffffff');
  },[S.darkMode]);

  // Screens animate in/out
  // perm → menu: perm slides left, menu comes from right
  // menu → game: menu slides left, game from right
  // game → menu: game slides right, menu comes from left
  function screenState(name){
    const order={perm:0,menu:1,game:2};
    const cur=order[screen]??1;
    const tgt=order[name]??1;
    if(name===screen)return'show';
    return tgt<cur?'hide-left':'hide-right';
  }

  return(
    <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden'}}>

      <div className={"screen "+screenState('perm')}>
        <PermScreen onDone={()=>setScreen('menu')}/>
      </div>

      <div className={"screen "+screenState('menu')}>
        <Settings S={S} upd={upd}
          onStart={c=>{setCfg(c);setScreen('game');}}/>
      </div>

      <div className={"screen "+screenState('game')}>
        {cfg&&<GameScreen cfg={cfg} darkMode={S.darkMode}
          onMenu={()=>setScreen('menu')}/>}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(App)
);
</script>
</body>
</html>
