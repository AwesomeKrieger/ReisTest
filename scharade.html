<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#ffffff"/>
<title>HeadBanz</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#ffffff;
  --off:#f7f8fa;
  --border:#e8eaed;
  --border2:#d1d5db;
  --text:#111318;
  --text2:#6b7280;
  --text3:#9ca3af;
  --blue:#2563eb;
  --blue-l:#eff6ff;
  --blue-b:#bfdbfe;
  --green:#16a34a;
  --green-l:#f0fdf4;
  --green-b:#bbf7d0;
  --red:#dc2626;
  --red-l:#fef2f2;
  --red-b:#fecaca;
  --yellow:#d97706;
  --yellow-l:#fffbeb;
  --yellow-b:#fde68a;
  --purple:#7c3aed;
  --orange:#ea580c;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.05);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--white);
  font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
#root{width:100%;height:100%;position:relative;}

/* ── SCROLLABLE ── */
.sc{overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sc::-webkit-scrollbar{width:3px;}
.sc::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── CARD ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-flat{background:var(--off);border:1px solid var(--border);border-radius:var(--radius);}

/* ── BUTTON BASE ── */
.btn{cursor:pointer;border:none;outline:none;font-family:'Nunito',sans-serif;
  transition:all .18s cubic-bezier(.34,1.4,.64,1);display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:scale(.95);}

.btn-primary{background:var(--blue);color:#fff;font-weight:800;border-radius:var(--radius);box-shadow:var(--shadow-md);}
.btn-primary:hover{background:#1d4ed8;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:var(--radius-sm);}
.btn-ghost:hover{background:var(--off);border-color:var(--border2);}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid var(--red-b);border-radius:var(--radius-sm);}
.btn-success{background:var(--green-l);color:var(--green);border:1px solid var(--green-b);border-radius:var(--radius);}
.btn-icon{background:transparent;color:var(--text3);border:none;padding:4px 6px;border-radius:6px;font-size:.85rem;}
.btn-icon:hover{background:var(--off);color:var(--text2);}

/* ── TOGGLE ── */
.tog-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;}
.tog-track{width:44px;height:26px;border-radius:13px;border:none;outline:none;
  position:relative;flex-shrink:0;transition:background .2s;}
.tog-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25);transition:transform .22s cubic-bezier(.34,1.4,.64,1);}
.tog-thumb.on{transform:translateX(18px);}

/* ── TAB BAR ── */
.tab-bar{display:flex;background:var(--off);border-radius:var(--radius);padding:3px;gap:2px;}
.tab-item{flex:1;padding:.45rem .5rem;border-radius:var(--radius-sm);border:none;outline:none;
  background:transparent;font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:700;
  color:var(--text3);cursor:pointer;transition:all .18s ease;white-space:nowrap;}
.tab-item.active{background:var(--white);color:var(--text);box-shadow:var(--shadow);}

/* ── INPUT ── */
.inp{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:.55rem .75rem;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:600;
  color:var(--text);outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--blue);}
.inp::placeholder{color:var(--text3);}

/* ── PLAYER CHIP ── */
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 6px 4px 10px;
  background:var(--off);border:1px solid var(--border);border-radius:20px;
  font-size:.82rem;font-weight:700;color:var(--text);}

/* ── SECTION HEADER ── */
.sec-hd{font-size:.7rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);margin-bottom:.5rem;}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;
  font-size:.72rem;font-weight:800;}

/* ── GAME BG (dark landscape only) ── */
.game-bg{position:fixed;inset:0;background:#0a0a0f;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 12s ease-in-out infinite;}
.o1{width:50vw;height:50vw;background:#1b3d70;top:-10%;left:-5%;animation-delay:0s;opacity:.6;}
.o2{width:40vw;height:40vw;background:#2c1468;top:20%;right:-5%;animation-delay:-4s;opacity:.5;}
.o3{width:35vw;height:35vw;background:#0c3a28;bottom:-8%;left:35%;animation-delay:-8s;opacity:.5;}
@keyframes drift{0%,100%{transform:translate(0,0)scale(1);}33%{transform:translate(2vw,-2vh)scale(1.05);}66%{transform:translate(-2vw,2vh)scale(.96);}}

/* ── GLASS (game only) ── */
.glass{background:rgba(255,255,255,.13);backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border:1px solid rgba(255,255,255,.28);
  box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.35);}
.glass-s{background:rgba(255,255,255,.2);backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border:1px solid rgba(255,255,255,.35);
  box-shadow:0 12px 48px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.45);}

/* ── WORD CARD ── */
.word-card{transition:all .38s cubic-bezier(.34,1.1,.64,1);}
.word-card.solved{background:rgba(22,163,74,.22)!important;border-color:rgba(22,163,74,.5)!important;
  box-shadow:0 0 60px rgba(22,163,74,.4),0 12px 40px rgba(0,0,0,.25),inset 0 1px 0 rgba(22,163,74,.4)!important;}
.word-card.skipped{background:rgba(217,119,6,.2)!important;border-color:rgba(217,119,6,.45)!important;
  box-shadow:0 0 60px rgba(217,119,6,.35),0 12px 40px rgba(0,0,0,.25),inset 0 1px 0 rgba(217,119,6,.35)!important;}

/* ── TIMER RING ── */
.t-ring{transform:rotate(-90deg);}
.t-ring circle{transition:stroke-dashoffset 1s linear;}

/* ── LANDSCAPE GATE (game screens only) ── */
.landscape-gate{display:none;position:fixed;inset:0;z-index:9998;background:var(--white);
  flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:2rem;}

/* ── DEBUG OVERLAY ── */
.debug{position:fixed;bottom:0;left:0;right:0;z-index:9990;background:rgba(0,0,0,.88);
  color:#0f0;font-family:monospace;font-size:.72rem;padding:.4rem .7rem;
  display:flex;gap:1rem;align-items:center;flex-wrap:wrap;}
.debug-bar{height:8px;border-radius:4px;background:#0f0;transition:width .1s linear;min-width:2px;}

/* ── PERM PULSE ── */
.pp{animation:ppulse 2s ease-in-out infinite;}
@keyframes ppulse{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.4),var(--shadow-md);}50%{box-shadow:0 0 0 12px rgba(37,99,235,0),var(--shadow-md);}}

/* ── BIG WORD ── */
.big-word{font-size:clamp(2rem,7vw,4.5rem);font-weight:900;letter-spacing:-.025em;
  line-height:1.05;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.3);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

/* ─── BUILT-IN CATEGORIES ─── */
const BUILTIN={
  "Tiere":["Elefant","Delfin","Pinguin","Krokodil","Flamingo","Nashorn","Gepard","Koala","Otter","Faultier","Axolotl","Schnabeltier","Quokka","Tapir","Leguan","Orang-Utan","Erdmännchen","Tukan","Wombat","Mantarochen"],
  "Filme":["Titanic","Matrix","Avatar","Inception","Interstellar","Gladiator","Der Pate","Joker","Parasite","Avengers","Forrest Gump","Pulp Fiction","Fight Club","The Dark Knight","Jurassic Park","E.T.","Star Wars","Memento","Amelie","Braveheart"],
  "Berufe":["Feuerwehrmann","Astronaut","Dirigent","Uhrmacher","Sommelier","Bestatter","Hebamme","Förster","Logopäde","Gerichtsmediziner","Imker","Kürschner","Notar","Taucher","Vulkanologe","Schornsteinfeger","Goldschmied","Glasmacher","Buchdrucker","Falknerin"],
  "Essen":["Sushi","Guacamole","Fondue","Tiramisu","Baklava","Hummus","Ceviche","Paella","Kimchi","Pho","Ratatouille","Shakshuka","Tagine","Wiener Schnitzel","Bibimbap","Crêpe","Borschtsch","Falafel","Rendang","Khinkali"],
  "Sport":["Curling","Bogenschießen","Sumo","Synchronschwimmen","Breakdance","Klettern","Fechten","Bobfahren","Polo","Snooker","Trampolinturnen","Skeleton","Wasserball","Floorball","Biathlon","Beachvolleyball","Taekwondo","Kanupolo","Hornussen","Sepaktakraw"],
  "Orte":["Machu Picchu","Stonehenge","Angkor Wat","Petra","Alhambra","Pompeji","Chichen Itza","Taj Mahal","Kolosseum","Akropolis","Timbuktu","Ephesos","Persepolis","Versailles","Neuschwanstein","Galapagos","Kappadokien","Fjorde","Okavango","Rapa Nui"],
  "Geschichte":["Napoleon","Kleopatra","Einstein","Shakespeare","Da Vinci","Mozart","Galileo","Marie Curie","Aristoteles","Kolumbus","Tesla","Newton","Darwin","Gandhi","Julius Cäsar","Marco Polo","Kopernikus","Archimedes","Sokrates","Konfuzius"],
  "Technologie":["Smartphone","Quantencomputer","3D-Drucker","Drohne","Roboter","Elektroauto","Satellit","Laser","Solarpanel","Bluetooth","KI","VR-Brille","Hologramm","Mikrochip","Magnetschwebebahn","Kernfusion","Supraleiter","Exoskelett","Bioreaktor","Nanobot"]
};

const TC=['#2563eb','#7c3aed','#ea580c','#16a34a','#dc2626','#0891b2'];
const vib=p=>navigator.vibrate&&navigator.vibrate(p);
const hapS=()=>vib([35]);const hapK=()=>vib([15,55,15]);const hapT=()=>vib([8]);const hapE=()=>vib([50,30,50]);
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};

/* ─── TOGGLE ─── */
const Tog=({on,oc,label})=>(
  <div className="tog-wrap" onClick={()=>{hapT();oc(!on);}}>
    <button className="tog-track" style={{background:on?'var(--blue)':'#d1d5db'}}>
      <div className={`tog-thumb${on?' on':''}`}/>
    </button>
    {label&&<span style={{fontSize:'.84rem',fontWeight:700,color:'var(--text2)'}}>{label}</span>}
  </div>
);

/* ─── TIMER RING ─── */
const TRing=({sec,mx,sz=68})=>{
  const r=(sz-8)/2,ci=2*Math.PI*r,pct=mx>0?sec/mx:1,off=ci*(1-pct);
  const col=sec<=10?'#ef4444':sec<=30?'#f59e0b':'#22c55e';
  return(
    <svg width={sz} height={sz} className="t-ring" style={{flexShrink:0}}>
      <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="rgba(255,255,255,.15)" strokeWidth="6"/>
      <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={col} strokeWidth="6"
        strokeDasharray={ci} strokeDashoffset={off} strokeLinecap="round"/>
      <text x={sz/2} y={sz/2+1} textAnchor="middle" dominantBaseline="middle"
        style={{fill:col,fontSize:'.95rem',fontWeight:900,fontFamily:'Nunito'}}
        transform={`rotate(90,${sz/2},${sz/2})`}>{sec}</text>
    </svg>
  );
};

/* ══════════════════════════════════════════
   DEBUG OVERLAY
══════════════════════════════════════════ */
function DebugOverlay({beta,gamma,alpha,threshold,onClose}){
  const pct=v=>Math.min(100,Math.max(0,(v+90)/180*100));
  const fwdPct=Math.min(100,Math.max(0,(-beta+90)/180*100));
  const bkPct=Math.min(100,Math.max(0,(beta+90)/180*100));
  const bIsFwd=beta!==null&&beta<-threshold;
  const bIsBk=beta!==null&&beta>threshold+20;
  return(
    <div className="debug">
      <button className="btn" onClick={onClose}
        style={{background:'#ef4444',color:'#fff',padding:'2px 8px',borderRadius:6,fontSize:'.7rem',fontWeight:800}}>✕ DEBUG</button>
      <span style={{color:'#ff0'}}>β={beta!==null?beta.toFixed(1):'–'}</span>
      <span style={{color:'#0ff'}}>γ={gamma!==null?gamma.toFixed(1):'–'}</span>
      <span style={{color:'#f0f'}}>α={alpha!==null?alpha.toFixed(1):'–'}</span>
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{color:'#888',fontSize:'.65rem'}}>VOR</span>
        <div style={{width:60,height:8,background:'rgba(255,255,255,.15)',borderRadius:4,overflow:'hidden'}}>
          <div className="debug-bar" style={{width:`${fwdPct}%`,background:bIsFwd?'#0f0':'#555'}}/>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{color:'#888',fontSize:'.65rem'}}>ZURÜCK</span>
        <div style={{width:60,height:8,background:'rgba(255,255,255,.15)',borderRadius:4,overflow:'hidden'}}>
          <div className="debug-bar" style={{width:`${bkPct}%`,background:bIsBk?'#ff0':'#555'}}/>
        </div>
      </div>
      <span style={{color:bIsFwd?'#0f0':bIsBk?'#ff0':'#555',fontWeight:900,fontSize:'.75rem'}}>
        {bIsFwd?'▲ GELÖST':bIsBk?'▼ SKIP':'○ NEUTRAL'}
      </span>
      <span style={{color:'#555',fontSize:'.65rem'}}>Schwelle: ±{threshold}°</span>
    </div>
  );
}

/* ══════════════════════════════════════════
   SCREEN: PERMISSION
══════════════════════════════════════════ */
function PermScreen({onDone}){
  const[st,setSt]=useState('idle');
  async function req(){hapT();
    if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
      try{const r=await DeviceOrientationEvent.requestPermission();
        if(r==='granted'){setSt('ok');setTimeout(onDone,600);}else{setSt('denied');hapE();}}
      catch{setSt('denied');hapE();}}
    else{setSt('ok');setTimeout(onDone,400);}
  }
  return(
    <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
      background:'var(--white)',padding:'2rem',zIndex:50}}>
      <div className="card" style={{maxWidth:380,width:'100%',padding:'2rem',textAlign:'center'}}>
        <div style={{fontSize:'3rem',marginBottom:'.75rem'}}>{st==='ok'?'✅':st==='denied'?'🚫':'📡'}</div>
        <div style={{fontSize:'1.35rem',fontWeight:900,color:'var(--text)',marginBottom:'.35rem'}}>
          {st==='ok'?'Bereit!':st==='denied'?'Kein Zugriff':'Sensor-Zugriff'}
        </div>
        <div style={{fontSize:'.87rem',color:'var(--text2)',lineHeight:1.7,marginBottom:'1.75rem'}}>
          {st==='denied'
            ?'Bitte erlaube den Bewegungssensor in den iOS-Einstellungen → Safari → Bewegung & Ausrichtung.'
            :<>Das Spiel nutzt den <strong style={{color:'var(--text)'}}>Neigungssensor</strong> deines Geräts.<br/>
            Gerät <strong style={{color:'var(--blue)'}}>nach vorne kippen</strong> = Wort gelöst ✓<br/>
            Gerät <strong style={{color:'var(--yellow)'}}>nach hinten kippen</strong> = Überspringen ↩</>}
        </div>
        {st!=='denied'&&(
          <button className={`btn btn-primary pp`} onClick={req}
            style={{width:'100%',padding:'1rem',fontSize:'1rem',fontWeight:800}}>
            {st==='ok'?'✓ Zugriff gewährt — weiter…':'🔓 Sensoren aktivieren'}
          </button>
        )}
        {st==='denied'&&(
          <button className="btn btn-ghost" onClick={()=>{setSt('idle');}}
            style={{width:'100%',padding:'.75rem',fontSize:'.9rem'}}>← Zurück</button>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   SCREEN: SETUP (portrait & landscape)
══════════════════════════════════════════ */
const TABS=['Spieler','Teams','Modus','Kategorien'];

function SetupScreen({onStart,initialPlayers}){
  const[tab,setTab]=useState(0);
  /* ── players ── */
  const[players,setPlayers]=useState(()=>{
    if(initialPlayers&&initialPlayers.length>0)return initialPlayers;
    return['Spieler 1','Spieler 2','Spieler 3','Spieler 4'];
  });
  const[newName,setNewName]=useState('');
  const[editIdx,setEditIdx]=useState(null);
  const[editVal,setEditVal]=useState('');

  /* ── teams ── */
  const half=Math.ceil(players.length/2);
  const[teams,setTeams]=useState(()=>[
    {name:'Team 1',players:players.slice(0,half),color:TC[0]},
    {name:'Team 2',players:players.slice(half),color:TC[1]}
  ]);

  /* Sync teams when players change */
  useEffect(()=>{
    setTeams(prev=>{
      // Remove players that don't exist anymore, keep team structure
      const all=players;
      const assigned=prev.flatMap(t=>t.players);
      const unassigned=all.filter(p=>!assigned.includes(p));
      let next=prev.map(t=>({...t,players:t.players.filter(p=>all.includes(p))}));
      // assign unassigned to team with fewest players
      unassigned.forEach(p=>{
        const mi=next.reduce((mi,t,i)=>t.players.length<next[mi].players.length?i:mi,0);
        next=next.map((t,i)=>i===mi?{...t,players:[...t.players,p]}:t);
      });
      return next;
    });
  },[players]);

  /* ── mode ── */
  const[mode,setMode]=useState('rounds');
  const[rds,setRds]=useState(3);
  const[tgt,setTgt]=useState(20);
  const[tsec,setTsec]=useState(60);

  /* ── categories ── */
  const[cats,setCats]=useState(BUILTIN);
  const[sel,setSel]=useState(Object.keys(BUILTIN));
  useEffect(()=>{
    fetch('categories.json').then(r=>r.json())
      .then(d=>{setCats(d);setSel(Object.keys(d));}).catch(()=>{});
  },[]);

  /* ── debug ── */
  const[debug,setDebug]=useState(false);

  const addPlayer=()=>{
    const n=newName.trim()||`Spieler ${players.length+1}`;
    setPlayers(p=>[...p,n]);setNewName('');
  };
  const removePlayer=idx=>setPlayers(p=>p.filter((_,i)=>i!==idx));
  const saveEdit=()=>{
    if(editIdx===null)return;
    const n=editVal.trim()||players[editIdx];
    setPlayers(p=>p.map((x,i)=>i===editIdx?n:x));
    setEditIdx(null);setEditVal('');
  };
  const movePlayer=(p,fromTi,toTi)=>{
    if(fromTi===toTi)return;
    setTeams(prev=>prev.map((t,i)=>({...t,players:i===toTi?[...t.players,p]:t.players.filter(x=>x!==p)})));
  };

  const totalWords=sel.reduce((a,c)=>a+(cats[c]?.length||0),0);
  const teamValid=teams.every(t=>t.players.length>=2);
  const valid=teamValid&&sel.length>0;

  const TO=[{l:'1 Min',v:60},{l:'2 Min',v:120},{l:'3 Min',v:180},{l:'5 Min',v:300},{l:'10 Min',v:600},{l:'∞',v:0}];

  const tabContent=[
    /* ── TAB 0: SPIELER ── */
    <div key="p" style={{padding:'1rem',display:'flex',flexDirection:'column',gap:'1rem'}}>
      <div>
        <div className="sec-hd">Namen hinzufügen</div>
        <div style={{display:'flex',gap:'.5rem'}}>
          <input className="inp" placeholder="Name eingeben…" value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addPlayer();}}}
            style={{flex:1}}/>
          <button className="btn btn-primary" onClick={addPlayer}
            style={{padding:'.55rem 1rem',fontWeight:800,fontSize:'.9rem',borderRadius:var(--radius)}}>
            + Hinzufügen
          </button>
        </div>
      </div>
      <div>
        <div className="sec-hd">{players.length} Spieler</div>
        <div style={{display:'flex',flexDirection:'column',gap:'.4rem'}}>
          {players.map((p,i)=>(
            <div key={i} className="card-flat" style={{display:'flex',alignItems:'center',gap:'.5rem',padding:'.5rem .65rem'}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:'var(--blue-l)',
                display:'flex',alignItems:'center',justifyContent:'center',

        <div style={{display:'flex',gap:'.4rem'}}>

            style={{padding:'3px 8px',fontSize:'.74rem',fontWeight:800}}>Alle</button>

            style={{padding:'3px 8px',fontSize:'.74rem',fontWeight:800}}>Keine</button>

        <div key={cat} style={{display:'flex',alignItems:'center',justifyContent:'space-between',

          borderRadius:var(--radius-sm),cursor:'pointer',transition:'all .15s'}}

          <div>
            <div style={{fontWeight:800,fontSize:'.88rem',color:sel.includes(cat)?'var(--blue)':'var(--text)'}}>{cat}</div>

  return(

            opacity:valid?1:.4,pointerEvents:valid?'auto':'none',borderRadius:var(--radius)}}>

/* ══════════════════════════════════════════
   SCREEN: GAME (landscape)
══════════════════════════════════════════ */
function GameScreen({cfg,onEnd}){
  const{teams,mode,rds,tgt,tsec,sel,cats,debug:dbgEnabled}=cfg;

  /* ── word pool ── */
  const pool=useMemo(()=>{
    const w=[];sel.forEach(c=>{if(cats[c])w.push(...cats[c]);});return shuffle(w);
  },[]);
  const used=useRef(new Set());
  const pull=()=>{
    const av=pool.filter(w=>!used.current.has(w));
    if(!av.length){used.current.clear();return pool[Math.floor(Math.random()*pool.length)]||'???';}
    const w=av[Math.floor(Math.random()*av.length)];used.current.add(w);return w;
  };

  /* ── state ── */
  const[ti,setTi]=useState(0);
  const[rno,setRno]=useState(0);
  const[sc,setSc]=useState(teams.map(()=>0));
  const[ph,setPh]=useState('ready');
  const[word,setWord]=useState('');
  const[fl,setFl]=useState(null);
  const[log,setLog]=useState([]);
  const[cor,setCor]=useState([]);
  const[tmr,setTmr]=useState(tsec>0?tsec:0);
  const[el,setEl]=useState(0);
  const tRef=useRef(null);const fRef=useRef(null);const dRef=useRef(false);const lRef=useRef([]);

  /* ── sensor ── */
  const[beta,setBeta]=useState(null);
  const[gamma,setGamma]=useState(null);
  const[alpha,setAlpha]=useState(null);
  const[showDbg,setShowDbg]=useState(dbgEnabled);
  const THRESH=22;const THRESH_BK=45;

  useEffect(()=>{lRef.current=log;},[log]);

  useEffect(()=>{
    const h=e=>{
      setBeta(e.beta);setGamma(e.gamma);setAlpha(e.alpha);
      if(ph!=='playing'||dRef.current)return;
      const b=e.beta;if(b===null||b===undefined)return;
      // Forward tilt: beta goes negative (screen faces down)
      if(b<-THRESH)deb(doSolve);
      // Backward tilt: beta goes positive past threshold
      else if(b>THRESH_BK)deb(doSkip);
    };
    window.addEventListener('deviceorientation',h,true);
    return()=>window.removeEventListener('deviceorientation',h,true);
  },[ph,word]);

  const deb=fn=>{if(dRef.current)return;dRef.current=true;fn();setTimeout(()=>{dRef.current=false;},900);};

  const startT=()=>{
    clearInterval(tRef.current);const tl=tsec;
    if(tl>0)setTmr(tl);setEl(0);
    tRef.current=setInterval(()=>{
      setEl(e=>e+1);
      if(tl>0)setTmr(t=>{if(t<=1){clearInterval(tRef.current);endR();return 0;}return t-1;});
    },1000);
  };
  const stopT=()=>clearInterval(tRef.current);

  const startR=()=>{const w=pull();setWord(w);setFl(null);setLog([]);lRef.current=[];setPh('playing');startT();};
  const doSolve=()=>{hapS();const w=word;setFl('solved');setLog(p=>{const n=[...p,{word:w,solved:true}];lRef.current=n;return n;});
    clearTimeout(fRef.current);fRef.current=setTimeout(()=>{setWord(pull());setFl(null);},550);};
  const doSkip=()=>{hapK();const w=word;setFl('skipped');setLog(p=>{const n=[...p,{word:w,solved:false}];lRef.current=n;return n;});
    clearTimeout(fRef.current);fRef.current=setTimeout(()=>{setWord(pull());setFl(null);},550);};
  const endR=()=>{stopT();setCor([...lRef.current]);setPh('correction');};
  const confirm=()=>{
    const pts=cor.filter(w=>w.solved).length;
    const ns=sc.map((s,i)=>i===ti?s+pts:s);
    if(mode==='highscore'&&ns[ti]>=tgt){setSc(ns);setPh('over');return;}
    let nti=(ti+1)%teams.length,nrno=rno;if(nti===0)nrno++;
    if(mode==='rounds'&&nrno>=rds){setSc(ns);setPh('over');return;}
    setSc(ns);setTi(nti);setRno(nrno);setPh('ready');
  };

  const team=teams[ti];

  /* Landscape gate for playing/correction/over screens */
  const LandscapeGate=()=>(
    <div className="landscape-gate" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      position:'fixed',inset:0,zIndex:9998,background:'var(--white)',
      '@media (orientation:landscape)':{display:'none'}}}>
      <div style={{fontSize:'3rem'}}>📱↻</div>
      <div style={{fontWeight:900,fontSize:'1.3rem',color:'var(--text)',marginTop:'.5rem'}}>Querformat nötig</div>
      <div style={{color:'var(--text2)',fontSize:'.88rem',marginTop:'.3rem'}}>Drehe dein Gerät für das Spiel.</div>
    </div>
  );

  /* ── READY ── */
  if(ph==='ready')return(
    <>
      <style>{`@media(orientation:portrait){.game-ls-gate{display:flex!important;}}`}</style>
      <div className="game-ls-gate" style={{display:'none',position:'fixed',inset:0,zIndex:9998,
        background:'var(--white)',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,textAlign:'center',padding:'2rem'}}>
        <div style={{fontSize:'3rem'}}>📱↻</div>
        <div style={{fontWeight:900,fontSize:'1.3rem',color:'var(--text)'}}>Querformat für das Spiel</div>
        <div style={{color:'var(--text2)',fontSize:'.88rem'}}>Drehe dein Gerät für das Spiel.</div>
      </div>
      <div className="game-bg">
        <div className="orb o1"/><div className="orb o2"/><div className="orb o3"/>
      </div>
      <div style={{position:'fixed',inset:0,zIndex:10,display:'flex',alignItems:'center',
        justifyContent:'center',flexDirection:'column',gap:'1rem',padding:'2rem'}}>
        <div className="glass-s" style={{borderRadius:24,padding:'2rem',maxWidth:500,width:'100%',textAlign:'center'}}>
          <div style={{fontSize:'.68rem',fontWeight:900,color:'rgba(255,255,255,.45)',
            letterSpacing:'.1em',textTransform:'uppercase',marginBottom:'.5rem'}}>
            {mode==='rounds'?`Runde ${rno+1} / ${rds}`:mode==='highscore'?`Ziel: ${tgt} Punkte`:'1v1 · Abwechselnde Runden'}
          </div>
          <div style={{fontSize:'2rem',fontWeight:900,color:team.color,marginBottom:'.2rem'}}>{team.name}</div>
          <div style={{color:'rgba(255,255,255,.6)',fontSize:'.88rem',marginBottom:'1.25rem'}}>{team.players.join(' · ')}</div>
          <div style={{display:'flex',gap:'.6rem',justifyContent:'center',flexWrap:'wrap',marginBottom:'1.5rem'}}>
            {teams.map((t,i)=>(
              <div key={i} style={{padding:'.4rem .9rem',borderRadius:12,
                background:i===ti?`${t.color}25`:'rgba(255,255,255,.07)',
                border:`1px solid ${i===ti?t.color+'55':'rgba(255,255,255,.12)'}`,textAlign:'center'}}>
                <div style={{color:t.color,fontWeight:900,fontSize:'1.4rem'}}>{sc[i]}</div>
                <div style={{color:'rgba(255,255,255,.45)',fontSize:'.68rem',fontWeight:700}}>{t.name}</div>
              </div>
            ))}
          </div>
          <div style={{color:'rgba(255,255,255,.45)',fontSize:'.78rem',marginBottom:'1.25rem',lineHeight:1.7}}>
            Erklärer hält Gerät flach über Kopf des Raters.<br/>
            <strong style={{color:'rgba(255,255,255,.75)'}}>Vor kippen</strong> = gelöst &nbsp;·&nbsp; <strong style={{color:'rgba(255,255,255,.75)'}}>Zurück kippen</strong> = skip
          </div>
          <button className="btn" onClick={()=>{hapT();startR();}}
            style={{background:'rgba(37,99,235,.35)',border:'1px solid rgba(37,99,235,.6)',
              color:'#93c5fd',fontWeight:900,fontSize:'1rem',padding:'.9rem 2rem',
              borderRadius:16,width:'100%',
              backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)'}}>
            ▶ Runde starten!
          </button>
        </div>
      </div>
      {showDbg&&<DebugOverlay beta={beta} gamma={gamma} alpha={alpha} threshold={THRESH} onClose={()=>setShowDbg(false)}/>}
    </>
  );

  /* ── PLAYING ── */
  if(ph==='playing'){
    const slv=log.filter(w=>w.solved).length,skp=log.filter(w=>!w.solved).length;
    return(
      <>
        <style>{`@media(orientation:portrait){.game-ls-gate{display:flex!important;}}`}</style>
        <div className="game-ls-gate" style={{display:'none',position:'fixed',inset:0,zIndex:9998,
          background:'var(--white)',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,textAlign:'center',padding:'2rem'}}>
          <div style={{fontSize:'3rem'}}>📱↻</div>
          <div style={{fontWeight:900,fontSize:'1.3rem',color:'var(--text)'}}>Querformat nötig</div>
          <div style={{color:'var(--text2)',fontSize:'.88rem'}}>Das Spiel läuft im Querformat.</div>
        </div>
        <div className="game-bg"><div className="orb o1"/><div className="orb o2"/><div className="orb o3"/></div>
        <div style={{position:'fixed',inset:0,zIndex:10,display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',gap:'.75rem',padding:'1rem 1.5rem'}}>
          {/* Top bar */}
          <div style={{position:'absolute',top:'.75rem',left:'1rem',right:'1rem',
            display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',gap:'.45rem',flexWrap:'wrap'}}>
              {teams.map((t,i)=>(
                <div key={i} style={{padding:'.25rem .65rem',borderRadius:8,
                  background:i===ti?`${t.color}28`:'rgba(255,255,255,.06)',
                  border:`1px solid ${i===ti?t.color+'50':'rgba(255,255,255,.1)'}`,
                  display:'flex',alignItems:'center',gap:4}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:t.color}}/>
                  <span style={{color:t.color,fontWeight:900,fontSize:'.85rem'}}>{sc[i]}</span>
                  <span style={{color:'rgba(255,255,255,.4)',fontSize:'.65rem'}}>{t.name}</span>
                </div>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
              <span style={{color:'#4ade80',fontWeight:900,fontSize:'.95rem'}}>✓{slv}</span>
              <span style={{color:'#fbbf24',fontWeight:900,fontSize:'.95rem'}}>↩{skp}</span>
              {tsec>0?<TRing sec={tmr} mx={tsec} sz={66}/>:
                <div style={{color:'rgba(255,255,255,.5)',fontWeight:700,fontSize:'.82rem'}}>{el}s</div>}
            </div>
          </div>
          {/* Word card */}
          <div className={`word-card glass-s ${fl||''}`}
            style={{borderRadius:26,padding:'1.75rem 2.5rem',width:'100%',maxWidth:600,
              minHeight:140,display:'flex',alignItems:'center',justifyContent:'center',textAlign:'center'}}>
            {fl==='solved'?<div style={{fontSize:'3.5rem'}}>✓</div>:
             fl==='skipped'?<div style={{fontSize:'3.5rem'}}>↩</div>:
             <div className="big-word">{word}</div>}
          </div>
          {/* Touch fallback */}
          <div style={{display:'flex',gap:'.75rem',width:'100%',maxWidth:520}}>
            <button className="btn" onClick={doSkip}
              style={{flex:1,padding:'.65rem',borderRadius:14,fontWeight:900,fontSize:'.9rem',
                background:'rgba(217,119,6,.25)',border:'1px solid rgba(217,119,6,.45)',color:'#fbbf24',
                backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)'}}>↩ Überspringen</button>
            <button className="btn" onClick={doSolve}
              style={{flex:1,padding:'.65rem',borderRadius:14,fontWeight:900,fontSize:'.9rem',
                background:'rgba(22,163,74,.25)',border:'1px solid rgba(22,163,74,.45)',color:'#4ade80',
                backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)'}}>✓ Gelöst</button>
          </div>
          <button className="btn" onClick={endR}
            style={{fontSize:'.72rem',padding:'.3rem .8rem',borderRadius:8,
              background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',
              color:'rgba(255,255,255,.4)',fontWeight:700}}>Runde beenden</button>
        </div>
        {showDbg&&<DebugOverlay beta={beta} gamma={gamma} alpha={alpha} threshold={THRESH} onClose={()=>setShowDbg(false)}/>}
      </>
    );
  }

  /* ── CORRECTION ── */
  if(ph==='correction'){
    const pts=cor.filter(w=>w.solved).length;
    return(
      <div style={{position:'fixed',inset:0,background:'var(--white)',display:'flex',
        flexDirection:'column',zIndex:10}}>
        {/* Header */}
        <div style={{padding:'1rem',borderBottom:'1px solid var(--border)',flexShrink:0,textAlign:'center'}}>
          <div style={{fontSize:'1.25rem',fontWeight:900,color:'var(--text)'}}>Rundenkorrektur</div>
          <div style={{fontSize:'.82rem',color:'var(--text2)',marginTop:2}}>
            {team.name} · Runde {rno+1}
            &nbsp;·&nbsp;<span style={{color:'var(--green)',fontWeight:800}}>{pts} Punkte</span>
          </div>
        </div>
        {/* List */}
        <div className="sc" style={{flex:1,padding:'.75rem',overflowY:'auto'}}>
          {cor.length===0&&(
            <div style={{textAlign:'center',padding:'2rem',color:'var(--text3)',fontSize:'.88rem'}}>
              Keine Begriffe gespielt.
            </div>
          )}
          {cor.map((item,idx)=>(
            <div key={idx} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
              padding:'.55rem .4rem',borderBottom:'1px solid var(--border)',gap:'.5rem'}}>
              <span style={{fontWeight:700,fontSize:'.9rem',color:'var(--text)'}}>{item.word}</span>
              <button className="btn" onClick={()=>{hapT();setCor(p=>p.map((w,i)=>i===idx?{...w,solved:!w.solved}:w));}}
                style={{padding:'.28rem .75rem',borderRadius:8,fontSize:'.78rem',fontWeight:800,whiteSpace:'nowrap',
                  background:item.solved?'var(--green-l)':'var(--red-l)',
                  border:`1px solid ${item.solved?'var(--green-b)':'var(--red-b)'}`,
                  color:item.solved?'var(--green)':'var(--red)'}}>
                {item.solved?'✓ Gelöst':'✗ Falsch'}
              </button>
            </div>
          ))}
        </div>
        {/* Confirm */}
        <div style={{padding:'.75rem',borderTop:'1px solid var(--border)',
          boxShadow:'0 -4px 12px rgba(0,0,0,.05)'}}>
          <button className="btn btn-primary" onClick={confirm}
            style={{width:'100%',padding:'1rem',fontSize:'1rem',fontWeight:900,borderRadius:var(--radius)}}>
            ✓ {pts} Punkte für {team.name} bestätigen
          </button>
        </div>
      </div>
    );
  }

  /* ── GAME OVER ── */
  if(ph==='over'){
    const mx=Math.max(...sc),wi=sc.indexOf(mx),tie=sc.filter(s=>s===mx).length>1,win=teams[wi];
    return(
      <div style={{position:'fixed',inset:0,background:'var(--white)',display:'flex',
        alignItems:'center',justifyContent:'center',padding:'2rem',zIndex:10}}>
        <div className="card" style={{maxWidth:480,width:'100%',padding:'2rem',textAlign:'center'}}>
          <div style={{fontSize:'4rem',marginBottom:'.6rem'}}>{tie?'🤝':'🏆'}</div>
          <div style={{fontSize:'2rem',fontWeight:900,color:tie?'var(--text)':win.color,
            letterSpacing:'-.025em',marginBottom:'.25rem'}}>
            {tie?'Unentschieden!':`${win.name} gewinnt!`}
          </div>
          {!tie&&<div style={{color:'var(--text2)',fontWeight:700,fontSize:'.88rem',marginBottom:'1.25rem'}}>
            {win.players.join(', ')}
          </div>}
          <div style={{display:'flex',gap:'.6rem',justifyContent:'center',margin:'1.25rem 0',flexWrap:'wrap'}}>
            {teams.map((t,i)=>(
              <div key={i} style={{padding:'.65rem 1.1rem',borderRadius:14,
                background:i===wi&&!tie?`${t.color}10`:'var(--off)',
                border:`1.5px solid ${i===wi&&!tie?t.color+'40':'var(--border)'}`,textAlign:'center',minWidth:80}}>
                <div style={{color:t.color,fontWeight:900,fontSize:'2rem',lineHeight:1}}>{sc[i]}</div>
                <div style={{color:'var(--text2)',fontSize:'.7rem',fontWeight:700,marginTop:2}}>{t.name}</div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:'.6rem'}}>
            <button className="btn btn-primary" onClick={()=>{hapT();onEnd();}}
              style={{flex:1,padding:'.9rem',fontSize:'.95rem',fontWeight:900,borderRadius:var(--radius)}}>
              🔄 Neues Spiel
            </button>
            <button className="btn btn-ghost" onClick={()=>{hapT();location.reload();}}
              style={{flex:1,padding:'.9rem',fontSize:'.95rem',fontWeight:800}}>
              ↩ Hauptmenü
            </button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

/* ══════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════ */
function App(){
  const[screen,setScreen]=useState('perm');
  const[players,setPlayers]=useState([]);
  const[cfg,setCfg]=useState(null);

  useEffect(()=>{
    const raw=new URLSearchParams(location.search).get('players');
    if(raw){
      const p=raw.split(',').map(s=>s.trim()).filter(Boolean);
      setPlayers(p.length>0?p:['Spieler 1','Spieler 2','Spieler 3','Spieler 4']);
    }else{
      setPlayers(['Spieler 1','Spieler 2','Spieler 3','Spieler 4']);
    }
  },[]);

  return(
    <>
      {screen==='perm'&&<PermScreen onDone={()=>setScreen('setup')}/>}
      {screen==='setup'&&<SetupScreen initialPlayers={players} onStart={c=>{setCfg(c);setScreen('game');}}/>}
      {screen==='game'&&cfg&&<GameScreen cfg={cfg} onEnd={()=>setScreen('setup')}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
